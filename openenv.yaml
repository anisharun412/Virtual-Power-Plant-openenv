spec_version: 1
name: vpp
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: "easy-arbitrage"
    description: "Stable market with predictable solar generation and modest price movements"
    difficulty: 1
  - id: "medium-forecast-error"
    description: "Normal market volatility with clouds reducing solar output unpredictably"
    difficulty: 2
  - id: "hard-frequency-response"
    description: "Extreme price spikes and grid emergencies requiring frequency support"
    difficulty: 3

